<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f">
<title>GYM PLAN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #17171a;
  --surface2: #202024;
  --border: #2a2a30;
  --accent: #d4f53c;
  --accent-dark: #8fa800;
  --orange: #ff6b35;
  --blue: #4fc3f7;
  --text: #f0f0ee;
  --muted: #7a7a85;
  --done-bg: #152210;
  --done-border: #3d6e18;
  --done-text: #7ecb35;
  --radius: 16px;
  --tab-h: 56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding-bottom: calc(var(--tab-h) + 20px);
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.app-header {
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  padding: 14px 18px 0;
  position: sticky; top: 0; z-index: 200;
}
.header-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.app-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem; letter-spacing: 3px;
  color: var(--accent); line-height: 1;
}
.app-tagline { font-size: 0.68rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); width: 36px; height: 36px; border-radius: 10px;
  font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.icon-btn:hover { border-color: var(--orange); color: var(--orange); }

/* ── DAY TABS ── */
.day-tabs {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 0;
  scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex: 1; min-width: 80px;
  background: transparent; border: none; border-bottom: 3px solid transparent;
  color: var(--muted); padding: 10px 4px 12px;
  font-size: 0.72rem; font-weight: 700; cursor: pointer;
  font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 1px;
  transition: all 0.2s; white-space: nowrap; text-align: center;
}
.day-tab:hover { color: var(--text); }
.day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── PROGRESS ── */
.progress-strip {
  padding: 10px 18px 6px;
  background: var(--bg);
}
.progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.progress-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.progress-count { font-size: 0.72rem; color: var(--accent); font-weight: 700; }
.progress-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* ── SCROLL CONTENT ── */
.scroll-content { padding: 16px 14px; max-width: 600px; margin: 0 auto; }

/* ── DAY HERO ── */
.day-hero {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 18px; padding: 16px 18px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  position: relative; overflow: hidden;
}
.day-hero::before {
  content: ''; position: absolute; top: -20px; right: -20px;
  width: 120px; height: 120px; border-radius: 50%;
  background: var(--accent); opacity: 0.04;
}
.day-hero-left {}
.day-hero-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem; line-height: 1; color: var(--accent); letter-spacing: 2px;
}
.day-hero-name {
  font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text); margin-top: 2px;
}
.day-hero-focus {
  font-size: 0.72rem; color: var(--muted); margin-top: 3px; line-height: 1.4;
}
.day-hero-right { text-align: right; }
.day-duration {
  font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
}
.day-duration strong { color: var(--orange); font-size: 0.85rem; }

/* ── SECTION LABEL ── */
.section-head {
  display: flex; align-items: center; gap: 10px;
  margin: 18px 0 10px;
}
.section-head-line { flex: 1; height: 1px; background: var(--border); }
.section-head-text {
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2px; color: var(--orange); white-space: nowrap;
}

/* ── EXERCISE CARD ── */
.ex-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
}
.ex-card.done {
  background: var(--done-bg);
  border-color: var(--done-border);
}
.ex-card-top {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; cursor: pointer;
}

/* IMAGE */
.ex-img-wrap {
  width: 64px; height: 64px; border-radius: 12px;
  overflow: hidden; flex-shrink: 0;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.9rem; position: relative;
}
.ex-img {
  width: 100%; height: 100%; object-fit: cover;
  transition: opacity 0.3s, filter 0.3s;
}
.ex-card.done .ex-img { opacity: 0.35; filter: grayscale(0.6); }
.ex-emoji { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }

/* INFO */
.ex-info { flex: 1; min-width: 0; }
.ex-name {
  font-weight: 700; font-size: 0.92rem; margin-bottom: 5px;
  transition: color 0.2s, text-decoration 0.2s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ex-card.done .ex-name { color: var(--done-text); text-decoration: line-through; opacity: 0.8; }
.ex-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.chip {
  padding: 2px 8px; border-radius: 6px;
  font-size: 0.65rem; font-weight: 600; letter-spacing: 0.3px;
}
.chip-reps { background: #1c2200; border: 1px solid #3a4800; color: var(--accent); }
.chip-muscle { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
.chip-rest { background: #1a1218; border: 1px solid #332030; color: #c084fc; }

/* CHECKBOX */
.ex-check-btn {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--border); background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; cursor: pointer; transition: all 0.2s;
  color: transparent;
}
.ex-card-top:hover .ex-check-btn { border-color: var(--accent); }
.ex-card.done .ex-check-btn {
  background: var(--done-border); border-color: var(--done-border); color: #fff;
}

/* ── WEIGHT PANEL ── */
.weight-panel {
  border-top: 1px solid var(--border);
  background: var(--surface2);
  padding: 12px 14px;
  display: none;
}
.ex-card.done .weight-panel { border-top-color: var(--done-border); }
.weight-panel.open { display: block; }
.weight-panel-title {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--muted); margin-bottom: 10px; font-weight: 600;
}
.sets-grid { display: flex; flex-direction: column; gap: 7px; }
.set-row {
  display: flex; align-items: center; gap: 10px;
}
.set-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; color: var(--accent); width: 22px; text-align: center; flex-shrink: 0;
}
.set-inputs { display: flex; gap: 6px; flex: 1; }
.set-input-wrap { flex: 1; position: relative; }
.set-input-label {
  position: absolute; top: 50%; left: 10px; transform: translateY(-50%);
  font-size: 0.6rem; color: var(--muted); text-transform: uppercase;
  pointer-events: none; letter-spacing: 0.5px;
}
.set-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 9px; padding: 8px 10px 4px 10px;
  color: var(--text); font-size: 0.9rem; font-weight: 600;
  font-family: 'DM Sans', sans-serif; text-align: center;
  transition: border-color 0.2s; -webkit-appearance: none; appearance: none;
}
.set-input:focus { outline: none; border-color: var(--accent); }
.set-input::placeholder { color: var(--muted); font-size: 0.8rem; font-weight: 400; }
.set-done-check {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1.5px solid var(--border); background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.8rem; color: transparent;
  transition: all 0.2s; flex-shrink: 0;
}
.set-done-check.checked { background: var(--done-border); border-color: var(--done-border); color: #fff; }
.set-row:hover .set-done-check { border-color: var(--done-text); }

/* ── EXPAND TOGGLE ── */
.ex-expand-btn {
  width: 100%; padding: 8px 14px;
  background: transparent; border: none; border-top: 1px solid var(--border);
  color: var(--muted); font-size: 0.7rem; font-family: 'DM Sans', sans-serif;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  transition: color 0.2s;
}
.ex-expand-btn:hover { color: var(--accent); }
.ex-expand-btn .arrow { transition: transform 0.2s; display: inline-block; }
.ex-expand-btn.open .arrow { transform: rotate(180deg); }

/* ── DONE BANNER ── */
.done-banner {
  background: linear-gradient(135deg, #152210, #1e3318);
  border: 1px solid var(--done-border);
  border-radius: var(--radius); padding: 22px;
  text-align: center; margin-top: 16px;
  animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275);
}
.done-banner .done-icon { font-size: 2.8rem; margin-bottom: 8px; }
.done-banner h3 {
  font-family: 'Bebas Neue', sans-serif; font-size: 2rem;
  color: var(--accent); letter-spacing: 3px;
}
.done-banner p { font-size: 0.82rem; color: var(--done-text); margin-top: 4px; }

@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--tab-h);
  background: var(--surface);
  border-top: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  z-index: 300; padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; height: 100%;
  background: transparent; border: none;
  color: var(--muted); font-size: 1.3rem;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  transition: color 0.2s;
}
.nav-btn span { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; font-weight: 600; }
.nav-btn.active { color: var(--accent); }

/* ── STATS VIEW ── */
.stats-view { padding: 16px 14px; max-width: 600px; margin: 0 auto; display: none; }
.stats-view.visible { display: block; }
.stats-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem;
  letter-spacing: 2px; color: var(--text); margin-bottom: 16px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
}
.stat-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.stat-card-name { font-weight: 700; font-size: 0.9rem; }
.stat-card-day { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.stat-sets { display: flex; gap: 8px; flex-wrap: wrap; }
.stat-set-pill {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 10px;
  font-size: 0.75rem; color: var(--text);
}
.stat-set-pill strong { color: var(--accent); }
.no-stats { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.85rem; }

/* ── MISC ── */
.main-view { display: block; }
.main-view.hidden { display: none; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-row">
    <div>
      <div class="app-title">GYM PLAN</div>
      <div class="app-tagline">Fortgeschritten · 3×/Woche · 6–10 Wdh.</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="resetDay()" title="Tag zurücksetzen">↺</button>
    </div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</header>

<!-- PROGRESS -->
<div class="progress-strip">
  <div class="progress-row">
    <span class="progress-label">Fortschritt</span>
    <span class="progress-count" id="progressCount">0 / 0</span>

  <div class="progress-track">

<!-- MAIN WORKOUT VIEW -->
<div class="main-view" id="mainView">

</div>

<!-- STATS VIEW -->
<div class="stats-view" id="statsView">

  <div id="statsContent"></div>
</div>

<nav class="bottom-nav">

  </button>
  <button class="nav-btn" id="navStats" onclick="showView('stats')">

</nav>

// state = { completed: {exId: bool}, weights: {exId: [{kg, reps, done}]}, expanded: {exId: bool} }
if (!state.completed) state.completed = {};
if (!state.weights)   state.weights   = {};
if (!state.expanded)  state.expanded  = {};

let currentDayIdx = 0;
let currentView   = 'workout';

function save() { localStorage.setItem('gym_v3', JSON.stringify(state)); }

function getDay() { return PLAN[currentDayIdx]; }

function allExIds() {
  return getDay().sections.flatMap(s => s.exercises.map(e => e.id));
}

// ─────────────────────────────────────────────
// VIEWS
// ─────────────────────────────────────────────
function showView(v) {
  currentView = v;
  document.getElementById('mainView').classList.toggle('hidden', v !== 'workout');
  document.getElementById('statsView').classList.toggle('visible', v === 'stats');
  document.getElementById('navWorkout').classList.toggle('active', v === 'workout');
  document.getElementById('navStats').classList.toggle('active', v === 'stats');
  if (v === 'stats') renderStats();
}

// ─────────────────────────────────────────────
// RESET
// ─────────────────────────────────────────────
function resetDay() {
  if (!confirm('Diesen Tag zurücksetzen?')) return;
  allExIds().forEach(id => {
    delete state.completed[id];
    delete state.expanded[id];
    delete state.weights[id];
  });
  save(); render();
}

// ─────────────────────────────────────────────
// TOGGLE EXERCISE DONE
// ─────────────────────────────────────────────
function toggleEx(id) {
  state.completed[id] = !state.completed[id];
  save(); render();
}

// ─────────────────────────────────────────────
// TOGGLE WEIGHT PANEL
// ─────────────────────────────────────────────
function toggleExpand(id) {
  state.expanded[id] = !state.expanded[id];
  save(); render();
}

// ─────────────────────────────────────────────
// WEIGHT / SET INPUT
// ─────────────────────────────────────────────
function initWeights(exId, numSets) {
  if (!state.weights[exId]) {
    state.weights[exId] = Array.from({length: numSets}, () => ({kg:'', reps:'', done: false}));
  } else if (state.weights[exId].length < numSets) {
    while (state.weights[exId].length < numSets)
      state.weights[exId].push({kg:'', reps:'', done: false});
  }
}

function updateWeight(exId, setIdx, field, value) {
  if (!state.weights[exId]) return;
  state.weights[exId][setIdx][field] = value;
  save();
}

function toggleSetDone(exId, setIdx) {
  if (!state.weights[exId]) return;
  state.weights[exId][setIdx].done = !state.weights[exId][setIdx].done;
  save(); render();
}

// ─────────────────────────────────────────────
// RENDER TABS
// ─────────────────────────────────────────────
function renderTabs() {
  document.getElementById('dayTabs').innerHTML = PLAN.map((d, i) => `
    <button class="day-tab ${i === currentDayIdx ? 'active' : ''}"
      onclick="currentDayIdx=${i};render()">
      ${d.label}
    </button>
  `).join('');
}

// ─────────────────────────────────────────────
// RENDER PROGRESS
// ─────────────────────────────────────────────
function renderProgress() {
  const ids = allExIds();
  const done = ids.filter(id => state.completed[id]).length;
  const pct  = ids.length ? done / ids.length * 100 : 0;
  document.getElementById('progressCount').textContent = `${done} / ${ids.length}`;
  document.getElementById('progressFill').style.width  = pct + '%';
  return { done, total: ids.length };
}

// ─────────────────────────────────────────────
// RENDER WORKOUT
// ─────────────────────────────────────────────
function renderWorkout() {
  const day = getDay();
  const { done, total } = renderProgress();
  let html = '';

  // Hero
  html += `
    <div class="day-hero">
      <div class="day-hero-left">
        <div class="day-hero-num">${day.title}</div>
        <div class="day-hero-name">${day.name}</div>
        <div class="day-hero-focus">${day.focus}</div>
      </div>
      <div class="day-hero-right">
        <div class="day-duration">⏱ <strong>${day.duration}</strong></div>
      </div>
    </div>`;

  // Sections
  for (const sec of day.sections) {
    html += `<div class="section-head">
      <div class="section-head-text">${sec.label}</div>
      <div class="section-head-line"></div>
    </div>`;

    for (const ex of sec.exercises) {
      const isDone   = !!state.completed[ex.id];
      const isExpand = !!state.expanded[ex.id];
      initWeights(ex.id, ex.sets);
      const ws = state.weights[ex.id];

      // Sets panel HTML
      let setsHtml = '';
      for (let i = 0; i < ex.sets; i++) {
        const w = ws[i];
        setsHtml += `
          <div class="set-row">
            <div class="set-num">${i+1}</div>
            <div class="set-inputs">
              <div class="set-input-wrap">
                <input class="set-input" type="number" inputmode="decimal"
                  placeholder="KG"
                  value="${w.kg}"
                  onchange="updateWeight('${ex.id}',${i},'kg',this.value)"
                  onclick="event.stopPropagation()">
              </div>
              <div class="set-input-wrap">
                <input class="set-input" type="number" inputmode="numeric"
                  placeholder="Wdh"
                  value="${w.reps}"
                  onchange="updateWeight('${ex.id}',${i},'reps',this.value)"
                  onclick="event.stopPropagation()">
              </div>
            </div>
            <button class="set-done-check ${w.done ? 'checked' : ''}"
              onclick="event.stopPropagation();toggleSetDone('${ex.id}',${i})">
              ${w.done ? '✓' : ''}
            </button>
          </div>`;
      }

      html += `
        <div class="ex-card ${isDone ? 'done' : ''}">
          <div class="ex-card-top" onclick="toggleEx('${ex.id}')">
            <div class="ex-img-wrap">
              <img class="ex-img" src="${ex.img}" alt="${ex.name}"
                onerror="this.style.display='none'">
              <div class="ex-emoji">${ex.emoji}</div>
            </div>
            <div class="ex-info">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-chips">
                <span class="chip chip-reps">${ex.sets}×${ex.reps}</span>
                <span class="chip chip-muscle">${ex.muscle}</span>
                <span class="chip chip-rest">⏸ ${ex.rest}</span>
              </div>
            </div>
            <button class="ex-check-btn">${isDone ? '✓' : ''}</button>
          </div>
          <button class="ex-expand-btn ${isExpand ? 'open' : ''}"
            onclick="toggleExpand('${ex.id}')">
            <span>${isExpand ? 'Gewichte ausblenden' : 'Gewichte eintragen'}</span>
            <span class="arrow">▾</span>
          </button>
          <div class="weight-panel ${isExpand ? 'open' : ''}">
            <div class="weight-panel-title">Sätze — Gewicht & Wiederholungen</div>
            <div class="sets-grid">${setsHtml}</div>
          </div>
        </div>`;
    }
  }

  // Done banner
  if (done === total && total > 0) {
    html += `
      <div class="done-banner">
        <div class="done-icon">🏆</div>
        <h3>FERTIG!</h3>
        <p>Ausgezeichnet! Training abgeschlossen. Erhol dich gut. 💪</p>
      </div>`;
  }

  document.getElementById('workoutContent').innerHTML = html;
}

// ─────────────────────────────────────────────
// RENDER STATS
// ─────────────────────────────────────────────
function renderStats() {
  let html = '';
  let found = false;

  for (const day of PLAN) {
    for (const sec of day.sections) {
      for (const ex of sec.exercises) {
        const ws = state.weights[ex.id];
        if (!ws) continue;
        const hasSets = ws.some(w => w.kg || w.reps);
        if (!hasSets) continue;
        found = true;

        let pillsHtml = ws.map((w, i) => {
          if (!w.kg && !w.reps) return '';
          return `<div class="stat-set-pill">
            Satz ${i+1}: <strong>${w.kg || '?'} kg</strong> × ${w.reps || '?'} Wdh
            ${w.done ? ' ✓' : ''}
          </div>`;
        }).join('');

        html += `
          <div class="stat-card">
            <div class="stat-card-header">
              <div class="stat-card-name">${ex.name}</div>
              <div class="stat-card-day">${day.name}</div>
            </div>
            <div class="stat-sets">${pillsHtml}</div>
          </div>`;
      }
    }
  }

  if (!found) {
    html = `<div class="no-stats">
      <div style="font-size:2.5rem;margin-bottom:10px">⚖️</div>
      <p>Noch keine Gewichte eingetragen.<br>Trag nach dem Training deine Gewichte ein!</p>
    </div>`;
  }

  document.getElementById('statsContent').innerHTML = html;
}

// ─────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────
function render() {
  renderTabs();
  renderWorkout();
}

render();
</script>
</body>
</html>
